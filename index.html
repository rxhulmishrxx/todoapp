<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=delete"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="main-container">
      <div class="section-first">
        <h1 id="todoheading">Todo List</h1>

        <input id="input-box" type="text" placeholder="Enter your task here " />
        <button id="Create-task">Create</button>
      </div>
      <div class="section-second">
  <div class="section-header">
    <h2>Pending Tasks</h2>
    <i class="fa-solid fa-chevron-right toggle-arrow"></i>
  </div>

  <!-- Empty container -->
  <div class="task-list"></div>
</div>

<div class="section-third">
  <div class="section-header">
    <h2>Completed Tasks</h2>
    <i class="fa-solid fa-chevron-right toggle-arrow"></i>
  </div>

  <!-- Empty container -->
  <div class="task-list"></div>
</div>

     <div class="section-fourth">
  <div class="section-header">
    <h2>Old Incomplete Tasks</h2>
    <i class="fa-solid fa-chevron-right toggle-arrow"></i>
  </div>

  <div class="task-list"></div>
</div>
    </div>





    <script src="script.js"></script>
  </body>
</html>
